<script>
    // --- LÓGICA DO COMPARTILHAMENTO E TOAST ---
    function shareProfile() {
        if (navigator.share) {
            navigator.share({
                title: 'VitãoTub | Links Oficiais',
                text: 'Confira os canais oficiais do VitãoTub!',
                url: window.location.href
            }).catch(console.error);
        } else {
            navigator.clipboard.writeText(window.location.href).then(() => {
                showToast("Link copiado com sucesso!");
            });
        }
    }

    function showToast(message) {
        const oldToast = document.querySelector('.bio-toast');
        if (oldToast) oldToast.remove();
        const toast = document.createElement('div');
        toast.className = 'bio-toast';
        toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => toast.classList.add('show'), 100);
        setTimeout(() => {
            toast.classList.remove('show');
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    // --- LÓGICA DE PULSO CORRIGIDA ---
    const allButtons = document.querySelectorAll('.bio-item, .btn-home');

    allButtons.forEach(button => {
        button.addEventListener('click', function(e) {
            // Adicionamos a classe de pulso
            this.classList.add('pulse-active');

            // Removemos a classe após a animação para permitir novos cliques
            setTimeout(() => {
                this.classList.remove('pulse-active');
            }, 400);

            // IMPORTANTE: Não usamos e.preventDefault(), 
            // então o navegador seguirá o link normalmente após o clique.
        });
    });
</script>
